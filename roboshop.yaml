- name: create a ec2 and r54 records
  hosts: all
  connection: local
  vars:
    sg_id: sg-0b983c3e1d2cd0e5c
    ami_id: ami-0220d79f3f480ecf5
    domain_name: jyothiy.online
    envr: dev
    instances: 
       - mongodb
       - catalogue
  tasks:
   - name: create ec2 instance
     amazon.aws.ec2_instance:
       instance_type: "t3.micro"
       security_group: "{{ sg_id }}"
       image_id: "{{ ami_id }}"
       name: "{{ item }}-{{ envr }}"
       tags:
           Project: roboshop
           Component: "{{ item }}"
           Environment: "{{ envr }}"
           Name: "{{ item }}-{{ envr }}"
     loop: "{{ instances }}"
     register: ec2_output

   - name: print the output
     ansible.builtin.debug:
       msg: "{{ ec2_output }}"

   - name: create r53 records
     amazon.aws.route53:
        state: present
        zone: "{{ domain_name }}"
        record: "{{ item.item }}-{{ envr }}.{{ domain_name }}"
        type: A
        ttl: 1
        value: "{{ item.instances[0].private_ip_address }}"
        wait: true
     loop: "{{ ec2_output.results }}"
     
   - name: create r53 records
     amazon.aws.route53:
        state: present
        zone: "{{ domain_name }}"
        record: "roboshop-{{ env }}.{{ domain_name }}"   #roboshop-dev.jyothiy.online
        type: A
        ttl: 1
        value: "{{ item.instances[0].public_ip_address }}"
        wait: true
     loop: "{{ ec2_output.results }}"
     when: item.item == "frontend"